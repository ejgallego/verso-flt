name: Blueprint Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: blueprint-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Blueprint Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/configure-pages@v5
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Restore Lake package cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/VersoBlueprint
            .lake/packages/mathlib
            .lake/packages/subverso
            .lake/packages/verso
          key: ${{ runner.os }}-lake-packages-v1-${{ hashFiles('lean-toolchain', 'lake-manifest.json', '.gitmodules') }}
          restore-keys: |
            ${{ runner.os }}-lake-packages-v1-
      - name: Show tool versions
        run: |
          lean --version
          lake --version
          git submodule status
      - name: Build Blueprint site
        run: bash ./scripts/ci-pages.sh
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _out/site/html-multi

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
